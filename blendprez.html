<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>I, AYE, AI // 40-SLIDE AUDIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #050505; --white: #fff; --grey: #1a1a1a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow: hidden; }
        .slide { width: 100vw; height: 100vh; position: absolute; padding: 8% 12%; display: flex; flex-direction: column; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s ease-out; }
        .slide.active { opacity: 1; visibility: visible; }
        h1 { font-size: 5vw; font-weight: 900; line-height: 0.9; text-transform: uppercase; margin: 0; }
        .red { color: var(--red); }
        .label { font-family: 'JetBrains Mono'; color: var(--red); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; font-size: 1vw; }
        .quote { font-size: 2.5vw; font-style: italic; font-weight: 300; border-left: 6px solid var(--red); padding-left: 30px; line-height: 1.2; }
        .progress { position: fixed; bottom: 0; left: 0; height: 4px; background: var(--red); transition: 0.3s; z-index: 100; }
        .big-num { font-size: 8vw; font-weight: 900; font-family: 'JetBrains Mono'; color: var(--red); line-height: 1; }
    </style>
</head>
<body>
    <div class="progress" id="progress"></div>
    <div id="deck"></div>

    <script>
        const deckData = [
            { l: "Title", h1: "I, AYE, <span class='red'>AI</span>" },
            { l: "Subtitle", h1: "The Human <span class='red'>Last Mile</span>" },
            { l: "Global Stats", h1: "<span class='red'>57%</span> Communication", p: "The global average for time spent in meetings/email (Microsoft)." },
            { l: "Survey Data", h1: "<span class='red'>26%</span> Meetings", p: "Your community's daily time-sink." },
            { l: "Global Burnout", h1: "<span class='red'>68%</span> Lack Focus", p: "People globally feel they have zero 'Deep Work' time." },
            { l: "The Survey Truth", h1: "<span class='red'>31%</span> Optics Tax", p: "Polishing artifacts for stakeholders rather than solving problems." },
            { l: "Craft Crisis", h1: "<span class='red'>35%</span> Deep Craft", p: "You are spending 5% less time on your craft than high-performers." },
            { l: "The Paradox", h1: "Automation is high.<br><span class='red'>Time</span> is low." },
            { l: "The Factory", q: "Everyone wants to be thoughtful... but it ends up a feature factory." },
            { l: "Transition", h1: "The system is hungry.<br>AI is just <span class='red'>fuel</span>." },
            { l: "Barriers", h1: "Top Barrier: <span class='red'>Compliance</span>", p: "Legal and Low Risk Appetite are killing innovation." },
            { l: "Barriers", h1: "<span class='red'>40%</span> Locked", p: "Stakeholder approval chains are the #2 villain." },
            { l: "The Mandate", h1: "AI Without <span class='red'>Purpose</span>", p: "1 in 5 feel AI is being pushed just to have it." },
            { l: "The Sentiment", q: "Limited access to AI tools... creates a constant sense of anxiety." },
            { l: "The Search", h1: "Search is <span class='red'>Dying</span>.", p: "AI is the new gated truth-teller controlled by IT." },
            { l: "Discovery", h1: "The Archetype <span class='red'>Trap</span>", p: "AI limits us to narrow, 'average' user personas." },
            { l: "Erasure", h1: "Culture <span class='red'>Erasure</span>", p: "Indigenous and minority data is being wiped from the training sets." },
            { l: "Competition", h1: "SMEs are <span class='red'>Crushed</span>", p: "Small biz lacks the massive data to compete with giants." },
            { l: "Tension", h1: "Quality vs Speed", p: "Hits Research and Design hardest (70% consensus)." },
            { l: "Transition", h1: "What are you <span class='red'>Protecting?</span>" },
            { l: "Irreplaceable", h1: "<span class='red'>Human</span>", p: "The #1 word used to describe irreplaceable skills." },
            { l: "Irreplaceable", h1: "<span class='red'>Trust</span>", p: "Relationship management is the skill AI cannot touch." },
            { l: "Nuance", h1: "<span class='red'>25%</span> Nuance", p: "Ability to 'read between the lines' is your fortress." },
            { l: "Talent", h1: "The <span class='red'>Junior Cliff</span>", p: "Article & Sun Life: We aren't backfilling entry level." },
            { l: "The Warning", q: "We are leveraging efficiency to justify the erosion of junior talent." },
            { l: "Ingenuity", h1: "<span class='red'>Ingenuity</span>", p: "Predicting failure points data hasn't seen yet." },
            { l: "Responsibility", h1: "<span class='red'>Moral Weight</span>", p: "Ownership of the 'uncomfy' consequence." },
            { l: "Story", q: "AI makes stories fall flat. Empathy is human." },
            { l: "Coaching", h1: "<span class='red'>Coaching</span>", p: "15% of you now spend more time developing people than pixels." },
            { l: "Transition", h1: "The Manifesto." },
            { l: "Perspective", h1: "AI is <span class='red'>BROWN</span>.", p: "The median average of the entire internet." },
            { l: "The Spice", h1: "You are the <span class='red'>COLOR</span>.", p: "If you aren't adding spice, you are redundant." },
            { l: "Advice", h1: "<span class='red'>30%</span> Advice", p: "Don't rely on AI for the 'Thinking'." },
            { l: "Advice", h1: "Be a <span class='red'>Challenger</span>", p: "Stop being a usability tester; challenge the status quo." },
            { l: "Advice", h1: "Push <span class='red'>Failure</span>", p: "Know where the machine breaks." },
            { l: "Judgment", h1: "Facts are <span class='red'>Free</span>.", p: "Judgment is the only thing worth paying for." },
            { l: "Survival", h1: "Be a <span class='red'>Business Owner</span>.", p: "Rise up and revolt against your job title." },
            { l: "The Contract", h1: "Expiry <span class='red'>Dates</span>", p: "Your job is a contract. Treat it as one." },
            { l: "The Question", h1: "What <span class='red'>Bullet</span> are you earning today?" },
            { l: "Closing", h1: "THE HUMAN <span class='red'>LAST MILE</span>." }
        ];

        const deck = document.getElementById('deck');
        deckData.forEach((d, i) => {
            const slide = document.createElement('div');
            slide.className = `slide ${i===0?'active':''}`;
            slide.innerHTML = `<div class="label">${d.l}</div>${d.h1?`<h1>${d.h1}</h1>`:''}${d.q?`<div class="quote">${d.q}</div>`:''}${d.p?`<p style="font-size:1.8vw;opacity:0.6;">${d.p}</p>`:''}`;
            deck.appendChild(slide);
        });

        let cur = 0;
        const slides = document.querySelectorAll('.slide');
        function update() {
            slides.forEach((s, i) => s.classList.toggle('active', i === cur));
            document.getElementById('progress').style.width = ((cur+1)/slides.length)*100 + '%';
        }
        window.onkeydown = e => {
            if(e.key === 'ArrowRight' || e.key === ' ') { cur = Math.min(cur+1, slides.length-1); update(); }
            if(e.key === 'ArrowLeft') { cur = Math.max(cur-1, 0); update(); }
        }
    </script>
</body>
</html>
